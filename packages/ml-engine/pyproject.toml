[project]
name = "neuroforge-ml-engine"
version = "0.1.0"
description = "NeuroForge core ML engine — architecture search, training, compression, and benchmarking. Zero web-framework dependencies by design."
requires-python = ">=3.11"
dependencies = [
    "torch>=2.2",
    "torchvision>=0.17",
    "optuna>=3.6",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "mypy>=1.9",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "slow: marks tests that train real models (deselect with -m 'not slow')",
]

[tool.mypy]
strict = true
exclude = ["tests"]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"